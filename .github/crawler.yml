name: Auto Football Data Crawler

on:
  schedule:
    # 매주 월요일(1), 금요일(5) 자정 (UTC 기준) -> 한국 시간 오전 9시
    - cron: '0 0 * * 1,5'
  
  # 수동 실행 버튼
  workflow_dispatch: 

jobs:
  build-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 사용하시는 파이썬 버전에 맞춰 수정 가능

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 생성한 requirements.txt를 읽어와서 라이브러리 설치
          pip install -r requirements.txt

      - name: Run crawling scripts
        run: |
          python premier_.py
          python league1.py

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # result_csv 폴더의 변경사항만 스테이징
          git add result_csv/
          
          # 변경된 데이터가 있을 때만 커밋 및 푸시
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update crawling results: $(date +'%Y-%m-%d')" && git push)