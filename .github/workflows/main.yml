name: 자동화_축구 리그 경기 일정 크롤링

on:
  schedule:
    # 매주 월요일(1), 금요일(5) 자정 (UTC 기준) -> 한국 시간 오전 9시
    - cron: '0 0 * * 1,5'
  
  # 수동 실행 버튼
  workflow_dispatch: 

jobs:
  build-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 사용하시는 파이썬 버전에 맞춰 수정 가능

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 생성한 requirements.txt를 읽어와서 라이브러리 설치
          pip install -r requirements.txt

      - name: Run crawling scripts
        run: |
          python premier_.py
          python league1.py
          python seriea_.py
          python laliga_.py
          python eredivisie.py
          python ligaportugal.py
          bundesliga.py

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # result_csv 폴더의 변경사항만 스테이징
          git add result_csv/
          
          # 💡 if문으로 풀어서 작성 (커밋할 내용이 있는지 확인)
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update crawling results: $(date +'%Y-%m-%d')"
            
            # 💡 [핵심 추가] push 하기 전에 깃허브의 최신 코드를 당겨와서(pull) 충돌을 해결합니다.
            git pull --rebase origin main
            
            git push
          else
            echo "변경사항이 없어서 커밋하지 않습니다."
          fi
